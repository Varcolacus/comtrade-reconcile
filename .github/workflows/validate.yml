name: validate
on: [push, workflow_dispatch]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Reproduce validation vs official BACI (committed fixtures, no API key)
        run: |
          ATLAS_ROOT=fixtures python validate.py 2024 | tee out.txt
          grep -qE "EXPORTER : top-1 2[0-9]/30" out.txt
          grep -qE "IMPORTER : top-1 2[0-9]/30" out.txt
          echo "validation reproduced from committed data."
