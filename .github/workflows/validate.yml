name: validate
on: [push, workflow_dispatch]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: End-to-end — reconcile the raw Comtrade fixture, then validate vs official BACI (no API key)
        run: |
          ATLAS_ROOT=fixtures python reconcile.py 2024        # raw Comtrade (committed, gzipped) -> recon_2024.csv
          ATLAS_ROOT=fixtures python validate.py 2024 | tee out.txt
          grep -qE "EXPORTER : top-1 2[0-9]/30" out.txt
          grep -qE "IMPORTER : top-1 2[0-9]/30" out.txt
          echo "end-to-end reproduced: raw Comtrade -> reconciliation -> validated vs BACI, no key."
      - name: Out-of-sample backtest + the origin-gap finding (no API key)
        run: |
          python backtest.py
          python findings.py
          test -f results/backtest.json && test -f results/findings.json
          echo "backtest + findings reproduced."
